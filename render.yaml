services:
  # 1. Backend Service (Node.js/Express API)
  - type: web
    name: emmasdale-backend
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URL
        sync: false # You must paste your MongoDB connection string in the Render Dashboard
      - key: JWT_SECRET
        sync: false # You must paste your secret key in the Render Dashboard
      - key: JWT_LIFETIME
        value: "1d"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # 2. Frontend Service (Next.js Client)
  - type: web
    name: emmasdale-frontend
    env: node
    rootDir: next-client
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        # This automatically points the frontend to the backend URL generated by Render
        fromService:
          type: web
          name: emmasdale-backend
          property: url
          # Appends /api/v1 to the backend's root URL
          transform: "${url}/api/v1"
